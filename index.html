<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レッスン室予約システム</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
</head>
<body>
<div id="app">
  <!-- School Code Screen -->
  <div id="screen-code" class="screen active">
    <div class="center-card">
      <div class="logo-area">
        <div class="logo-icon">♪</div>
        <h1>レッスン室予約システム</h1>
        <p class="subtitle">学校コードを入力してください</p>
      </div>
      <div class="form-group">
        <input type="text" id="school-code-input" placeholder="学校コード" maxlength="10" autocomplete="off">
      </div>
      <div id="code-error" class="error-msg hidden"></div>
      <button id="btn-code-submit" class="btn-primary">次へ</button>
      <div class="admin-link">
        <button id="btn-to-admin" class="btn-ghost">管理者画面へ</button>
      </div>
      <div class="monitor-link">
        <button id="btn-to-monitor" class="btn-ghost">廊下モニター表示</button>
      </div>
    </div>
  </div>

  <!-- Auth Choice Screen -->
  <div id="screen-auth-choice" class="screen">
    <div class="center-card">
      <div class="logo-area">
        <div class="logo-icon">♪</div>
        <h1>ようこそ</h1>
        <p class="subtitle" id="school-name-display"></p>
      </div>
      <button id="btn-go-login" class="btn-primary">ログイン</button>
      <button id="btn-go-register" class="btn-secondary">新規登録</button>
      <button id="btn-back-to-code" class="btn-ghost">← 戻る</button>
    </div>
  </div>

  <!-- Register Screen -->
  <div id="screen-register" class="screen">
    <div class="center-card">
      <div class="logo-area">
        <h1>新規登録</h1>
      </div>
      <div class="form-group">
        <label>学年</label>
        <select id="reg-grade">
          <option value="">選択してください</option>
          <option value="1">1年生</option>
          <option value="2">2年生</option>
          <option value="3">3年生</option>
        </select>
      </div>
      <div class="form-group">
        <label>出席番号</label>
        <input type="number" id="reg-number" placeholder="例：15" min="1" max="50">
      </div>
      <div class="form-group">
        <label>名前</label>
        <input type="text" id="reg-name" placeholder="例：山田 太郎">
      </div>
      <div id="reg-error" class="error-msg hidden"></div>
      <button id="btn-register" class="btn-primary">登録する</button>
      <button id="btn-back-to-choice" class="btn-ghost">← 戻る</button>
    </div>
  </div>

  <!-- Login Screen -->
  <div id="screen-login" class="screen">
    <div class="center-card">
      <div class="logo-area">
        <h1>ログイン</h1>
      </div>
      <div class="form-group">
        <label>学年</label>
        <select id="login-grade">
          <option value="">学年を選択</option>
          <option value="1">1年生</option>
          <option value="2">2年生</option>
          <option value="3">3年生</option>
        </select>
      </div>
      <div class="form-group">
        <label>名前</label>
        <select id="login-name" disabled>
          <option value="">先に学年を選択してください</option>
        </select>
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button id="btn-login" class="btn-primary">ログイン</button>
      <button id="btn-back-to-choice-from-login" class="btn-ghost">← 戻る</button>
    </div>
  </div>

  <!-- Main Student Screen -->
  <div id="screen-main" class="screen">
    <header class="app-header">
      <div class="header-left">
        <div class="logo-small">♪</div>
        <h2>レッスン室予約</h2>
      </div>
      <div class="header-right">
        <span id="user-display" class="user-badge"></span>
        <button id="btn-logout" class="btn-ghost-sm">ログアウト</button>
      </div>
    </header>

    <div class="main-nav">
      <button class="nav-btn active" data-tab="booking">週間予約</button>
      <button class="nav-btn" data-tab="search">空き室検索</button>
      <button class="nav-btn" data-tab="my-reservations">自分の予約</button>
    </div>

    <!-- Booking Tab -->
    <div id="tab-booking" class="tab-content active">
      <div class="tab-inner">
        <div class="room-selector-row">
          <label>レッスン室</label>
          <select id="booking-room-select">
            <option value="">レッスン室を選択してください</option>
          </select>
        </div>
        <div class="week-nav">
          <button id="prev-week" class="week-btn">&#8249;</button>
          <span id="week-label" class="week-label"></span>
          <button id="next-week" class="week-btn">&#8250;</button>
        </div>
        <div class="calendar-wrapper">
          <div id="weekly-calendar" class="weekly-calendar">
            <!-- Generated by JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- Search Tab -->
    <div id="tab-search" class="tab-content">
      <div class="tab-inner">
        <h3 class="tab-title">空き室検索</h3>
        <div class="search-form">
          <div class="form-group">
            <label>日付を選択</label>
            <input type="date" id="search-date">
          </div>
          <button id="btn-search" class="btn-primary">検索する</button>
        </div>
        <div id="search-results" class="search-results"></div>
      </div>
    </div>

    <!-- My Reservations Tab -->
    <div id="tab-my-reservations" class="tab-content">
      <div class="tab-inner">
        <h3 class="tab-title">自分の予約一覧</h3>
        <div id="my-reservations-list" class="reservations-list"></div>
      </div>
    </div>
  </div>

  <!-- Admin Password Screen -->
  <div id="screen-admin-auth" class="screen">
    <div class="center-card">
      <div class="logo-area">
        <div class="logo-icon admin-icon">⚙</div>
        <h1>管理者認証</h1>
      </div>
      <div class="form-group">
        <label>管理者パスワード</label>
        <input type="password" id="admin-password-input" placeholder="パスワードを入力">
      </div>
      <div id="admin-auth-error" class="error-msg hidden"></div>
      <button id="btn-admin-login" class="btn-primary">ログイン</button>
      <button id="btn-back-from-admin-auth" class="btn-ghost">← 戻る</button>
    </div>
  </div>

  <!-- Admin Main Screen -->
  <div id="screen-admin" class="screen">
    <header class="app-header admin-header">
      <div class="header-left">
        <div class="logo-small">⚙</div>
        <h2>管理者画面</h2>
      </div>
      <div class="header-right">
        <button id="btn-admin-logout" class="btn-ghost-sm">ログアウト</button>
      </div>
    </header>

    <div class="main-nav">
      <button class="nav-btn active" data-admin-tab="rooms">レッスン室管理</button>
      <button class="nav-btn" data-admin-tab="reservations">予約管理</button>
      <button class="nav-btn" data-admin-tab="students">生徒管理</button>
      <button class="nav-btn" data-admin-tab="settings">設定</button>
    </div>

    <!-- Rooms Tab -->
    <div id="admin-tab-rooms" class="tab-content active">
      <div class="tab-inner">
        <div class="admin-section-header">
          <h3>レッスン室一覧</h3>
          <button id="btn-add-room" class="btn-primary-sm">＋ 追加</button>
        </div>
        <div id="admin-rooms-list" class="admin-list"></div>
      </div>
    </div>

    <!-- Reservations Tab -->
    <div id="admin-tab-reservations" class="tab-content">
      <div class="tab-inner">
        <div class="admin-section-header">
          <h3>予約管理</h3>
          <button id="btn-add-reservation-admin" class="btn-primary-sm">＋ 予約追加</button>
        </div>
        <div class="admin-filter-row">
          <input type="date" id="admin-filter-date">
          <select id="admin-filter-room">
            <option value="">全てのレッスン室</option>
          </select>
          <button id="btn-admin-filter" class="btn-secondary-sm">絞り込み</button>
        </div>
        <div id="admin-reservations-list" class="admin-list"></div>
      </div>
    </div>

    <!-- Students Tab -->
    <div id="admin-tab-students" class="tab-content">
      <div class="tab-inner">
        <h3>生徒一覧</h3>
        <div id="admin-students-list" class="admin-list"></div>
      </div>
    </div>

    <!-- Settings Tab -->
    <div id="admin-tab-settings" class="tab-content">
      <div class="tab-inner">
        <h3>設定</h3>
        <div class="settings-section">
          <h4>パスワード変更</h4>
          <div class="form-group">
            <label>現在のパスワード</label>
            <input type="password" id="current-pw">
          </div>
          <div class="form-group">
            <label>新しいパスワード</label>
            <input type="password" id="new-pw">
          </div>
          <div class="form-group">
            <label>新しいパスワード（確認）</label>
            <input type="password" id="new-pw-confirm">
          </div>
          <div id="pw-change-msg" class="hidden"></div>
          <button id="btn-change-pw" class="btn-primary">パスワードを変更</button>
        </div>
        <div class="settings-section">
          <h4>学校情報</h4>
          <div class="form-group">
            <label>学校名</label>
            <input type="text" id="school-name-input" placeholder="学校名">
          </div>
          <button id="btn-save-school-name" class="btn-secondary">保存</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Booking Modal -->

  <div class="modal-overlay"></div>
  <div class="modal-box">

      </select>
    </div>
    <div class="form-group">

      <select id="modal-end-period">
        <option value="1">1時限目</option>
        <option value="2">2時限目</option>
        <option value="3">3時限目</option>
        <option value="4">4時限目</option>
        <option value="5">5時限目</option>

      </select>

</div>

<!-- Add Room Modal -->

  <div class="modal-box">
    <h3>レッスン室を追加</h3>

      <label>レッスン室名</label>

  </div>

<!-- Admin Add Reservation Modal -->

  <div class="modal-overlay"></div>

<!-- Monitor Screen -->
<div id="screen-monitor" class="screen" style="background:#0a0e1a;color:#f1f5f9;min-height:100vh;display:none;flex-direction:column;">
  <header style="display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:#0d1526;border-bottom:1px solid #1e2d45;flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:14px;">
      <span style="font-size:26px;">♪</span>
      <div>
        <div style="font-size:20px;font-weight:700;letter-spacing:.05em;">レッスン室 使用状況</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:2px;" id="mon-school-name">音楽科</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div style="text-align:right;">
        <div style="font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;" id="mon-clock">--:--:--</div>
        <div style="font-size:13px;color:#94a3b8;" id="mon-date"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button id="btn-monitor-fullscreen" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#94a3b8;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;">全画面</button>
        <button id="btn-monitor-back" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#94a3b8;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;">← 戻る</button>
      </div>
    </div>
  </header>
  <div style="display:flex;align-items:center;gap:8px;padding:8px 28px;background:#0d1526;border-bottom:1px solid #1e2d45;overflow-x:auto;flex-shrink:0;">
    <span style="font-size:12px;color:#94a3b8;white-space:nowrap;">時限：</span>
    <div id="mon-period-chips" style="display:flex;gap:6px;"></div>
  </div>
  <main style="flex:1;overflow-y:auto;padding:20px 24px 70px;">
    <div id="mon-rooms-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8;">読み込み中...</div>
    </div>
  </main>
  <div style="display:flex;gap:20px;align-items:center;padding:10px 28px;background:#0d1526;border-top:1px solid #1e2d45;position:sticky;bottom:0;">
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:10px;height:10px;border-radius:50%;background:#10b981;"></div>
      <span style="font-size:13px;color:#94a3b8;">空き <strong id="mon-stat-free" style="color:#f1f5f9;">-</strong> 室</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:10px;height:10px;border-radius:50%;background:#ef4444;"></div>
      <span style="font-size:13px;color:#94a3b8;">使用中 <strong id="mon-stat-busy" style="color:#f1f5f9;">-</strong> 室</span>
    </div>
    <span style="font-size:13px;color:#94a3b8;">合計 <strong id="mon-stat-total" style="color:#f1f5f9;">-</strong> 室</span>
    <span style="margin-left:auto;font-size:12px;color:#94a3b8;" id="mon-refresh-info">リアルタイム更新中</span>
  </div>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/app.js"></script>

<script>
// ===== モニター機能 =====
const MON_DAY_NAMES = ['日','月','火','水','木','金','土'];
const MON_PERIOD_TIMES = {1:'8:45〜9:35',2:'9:45〜10:35',3:'10:45〜11:35',4:'12:30〜13:20',5:'13:30〜14:20',6:'14:30〜15:20'};
const MON_PERIOD_RANGES = [null,[8*60+45,9*60+35],[9*60+45,10*60+35],[10*60+45,11*60+35],[12*60+30,13*60+20],[13*60+30,14*60+20],[14*60+30,15*60+20]];
let monUnsubRooms=null,monUnsubRes=null,monRooms=[],monReservations=[],monClockInterval=null;

function monFormatDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function monGetCurrentPeriod(){
  const now=new Date(),t=now.getHours()*60+now.getMinutes();
  for(let p=1;p<=6;p++){const[s,e]=MON_PERIOD_RANGES[p];if(t>=s&&t<=e)return p;}
  return null;
}

function monUpdateClock(){
  const now=new Date();
  const el=document.getElementById('mon-clock');
  if(el)el.textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const de=document.getElementById('mon-date');
  if(de)de.textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日(${MON_DAY_NAMES[now.getDay()]})`;
  monUpdatePeriodBar();
}

function monUpdatePeriodBar(){
  const current=monGetCurrentPeriod(),now=new Date(),t=now.getHours()*60+now.getMinutes();
  const container=document.getElementById('mon-period-chips');
  if(!container)return;
  container.innerHTML='';
  for(let p=1;p<=6;p++){
    const[s,e]=MON_PERIOD_RANGES[p];
    const chip=document.createElement('div');
    let bg,color,border,text,shadow='';
    if(p===current){bg='#3b82f6';color='white';border='#3b82f6';text=`▶ ${p}限 ${MON_PERIOD_TIMES[p]}`;shadow='0 0 10px rgba(59,130,246,.5)';}
    else if(t>e){bg='#1e2535';color='#94a3b8';border='#2a3550';text=`${p}限 終了`;}
    else{bg='#152035';color='#60a5fa';border='#1e3a5f';text=`${p}限 ${MON_PERIOD_TIMES[p]}`;}
    chip.style.cssText=`padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;background:${bg};color:${color};border:1px solid ${border};box-shadow:${shadow};`;
    chip.textContent=text;
    container.appendChild(chip);
  }
}

function monRenderRooms(){
  const grid=document.getElementById('mon-rooms-grid');
  if(!grid)return;
  const current=monGetCurrentPeriod();
  if(monRooms.length===0){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8;">レッスン室が登録されていません</div>';return;}
  const roomBookings={};
  monReservations.forEach(res=>{if(!roomBookings[res.roomId])roomBookings[res.roomId]=[];roomBookings[res.roomId].push(res);});
  let freeCount=0,busyCount=0;
  grid.innerHTML='';
  monRooms.forEach(room=>{
    const bookings=roomBookings[room.id]||[];
    const periodStatus={};
    for(let p=1;p<=6;p++){periodStatus[p]=bookings.find(b=>p>=b.startPeriod&&p<=b.endPeriod)||null;}
    const isCurrentlyBusy=current?!!periodStatus[current]:false;
    const currentBooking=current?periodStatus[current]:null;
    if(isCurrentlyBusy)busyCount++;else freeCount++;
    const card=document.createElement('div');
    const cardBg=isCurrentlyBusy?'#2a0a0a':'#052e20';
    const cardBorder=isCurrentlyBusy?'#7f1d1d':'#065f46';
    card.style.cssText=`background:${cardBg};border:1.5px solid ${cardBorder};border-radius:14px;padding:18px;transition:all .3s;`;
    const sColor=isCurrentlyBusy?'#ef4444':'#10b981';
    const sBorder=isCurrentlyBusy?'#7f1d1d':'#065f46';
    const sBg=isCurrentlyBusy?'rgba(239,68,68,.15)':'rgba(16,185,129,.15)';
    const sText=isCurrentlyBusy?'使用中':'空き';
    const sAnim=isCurrentlyBusy?'animation:monPulse 2s ease-in-out infinite;':'';
    let cells='<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:12px;">';
    for(let p=1;p<=6;p++){
      const busy=!!periodStatus[p],isCur=p===current;
      const cBg=busy?'rgba(239,68,68,.1)':'rgba(16,185,129,.1)';
      const cBorder=busy?(isCur?'#ef4444':'rgba(239,68,68,.2)'):(isCur?'#10b981':'rgba(16,185,129,.2)');
      const nColor=isCur?(busy?'#ef4444':'#10b981'):'#94a3b8';
      const sym=busy?'<span style="color:#ef4444;font-size:14px;font-weight:700;">×</span>':'<span style="color:#10b981;font-size:14px;font-weight:700;">○</span>';
      const sh=isCur?`box-shadow:0 0 0 1px ${busy?'#ef4444':'#10b981'};`:'';
      cells+=`<div style="background:${cBg};border:1px solid ${cBorder};border-radius:6px;padding:5px 3px;text-align:center;${sh}"><div style="font-size:10px;color:${nColor};font-weight:${isCur?700:400};">${p}限</div>${sym}</div>`;
    }
    cells+='</div>';
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:${currentBooking?'10px':'0'};">
        <div><div style="font-size:18px;font-weight:700;">🎵 ${room.name}</div>${room.desc?`<div style="font-size:11px;color:#94a3b8;margin-top:3px;">${room.desc}</div>`:''}</div>
        <div style="padding:5px 12px;border-radius:20px;font-size:13px;font-weight:700;background:${sBg};color:${sColor};border:1px solid ${sBorder};white-space:nowrap;${sAnim}">${sText}</div>
      </div>
      ${currentBooking?`<div style="font-size:13px;color:#ef4444;font-weight:600;padding:7px 10px;background:rgba(239,68,68,.08);border-radius:7px;border-left:3px solid #ef4444;margin-bottom:8px;">👤 ${currentBooking.studentName}（${currentBooking.studentGrade}年） ${currentBooking.startPeriod}〜${currentBooking.endPeriod}限</div>`:''}
      ${cells}`;
    grid.appendChild(card);
  });
  const sf=document.getElementById('mon-stat-free'),sb=document.getElementById('mon-stat-busy'),st=document.getElementById('mon-stat-total');
  if(sf)sf.textContent=freeCount;if(sb)sb.textContent=busyCount;if(st)st.textContent=monRooms.length;
  const ri=document.getElementById('mon-refresh-info');
  const now=new Date();
  if(ri)ri.textContent=`最終更新: ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')} ／ リアルタイム更新中`;
}

function monStart(){
  const todayStr=monFormatDate(new Date());
  db.collection('settings').doc('config').get().then(snap=>{
    const el=document.getElementById('mon-school-name');
    if(snap.exists&&snap.data().schoolName&&el)el.textContent=snap.data().schoolName+' レッスン室';
  }).catch(()=>{});
  monUnsubRooms=db.collection('rooms').orderBy('createdAt').onSnapshot(snap=>{
    monRooms=[];snap.forEach(doc=>monRooms.push({id:doc.id,...doc.data()}));monRenderRooms();
  });
  monUnsubRes=db.collection('reservations').where('date','==',todayStr).onSnapshot(snap=>{
    monReservations=[];snap.forEach(doc=>monReservations.push({id:doc.id,...doc.data()}));monRenderRooms();
  });
  monUpdateClock();
  monClockInterval=setInterval(monUpdateClock,1000);
}

function monStop(){
  if(monUnsubRooms){monUnsubRooms();monUnsubRooms=null;}
  if(monUnsubRes){monUnsubRes();monUnsubRes=null;}
  if(monClockInterval){clearInterval(monClockInterval);monClockInterval=null;}
}

const monStyle=document.createElement('style');
monStyle.textContent='@keyframes monPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 8px 2px rgba(239,68,68,.3)}}';
document.head.appendChild(monStyle);

document.addEventListener('DOMContentLoaded',()=>{
  const btnTo=document.getElementById('btn-to-monitor');
  if(btnTo)btnTo.onclick=()=>{
    document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='';});
    const ms=document.getElementById('screen-monitor');
    ms.style.display='flex';ms.classList.add('active');
    monStart();
  };
  const btnBack=document.getElementById('btn-monitor-back');
  if(btnBack)btnBack.onclick=()=>{
    monStop();
    if(document.fullscreenElement)document.exitFullscreen();
    const ms=document.getElementById('screen-monitor');
    ms.style.display='none';ms.classList.remove('active');
    showScreen('screen-code');
  };
  const btnFs=document.getElementById('btn-monitor-fullscreen');
  if(btnFs)btnFs.onclick=()=>{
    if(!document.fullscreenElement){document.documentElement.requestFullscreen();btnFs.textContent='全画面解除';}
    else{document.exitFullscreen();btnFs.textContent='全画面';}
  };
});
</script>

</body>
